# Snakemake workflow configuration

# Random seed for reproducibility
random_seed: 0

# SMILES of molecules to exclude from specific datasets when downloading.
# Keyed by QCArchive dataset name (must match the name passed to get-qca-torsion-input).
exclude_smiles:
  "OpenFF-benchmark-ligand-fragments-v2.0":
    # Has a weird H bonded directly to S (breaks ELF-10; no atom type for this H)
    - "[H:9][c:8]1[c:6]([c:5]([c:47]([c:45]([c:10]1[N:11]([H:44])[c:12]2[n:38][c:37]3[c:36]([c:14]([n:13]2)[O:15][C:16]([H:34])([H:35])[C:17]4([C:19]([C:22]([C:25]([C:28]([C:31]4([H:32])[H:33])([H:29])[H:30])([H:26])[H:27])([H:23])[H:24])([H:20])[H:21])[H:18])[N:43]=[C:41]([N:39]3[H:40])[H:42])[H:46])[H:48])[S:2](=[O:3])(=[O:4])[H:1])[H:7]"

# TNet500 dataset splitting
tnet500_frac_test: 0.8  # 20% validation, 80% test

# Protein force field configurations for benchmarking
protein_force_fields:
  #  "AceFF_2.0":
  #    ff_path: "dummy_ff.xml"
  #    ff_type: "aceff20"
  "Sage_230":
    ff_path: "input_ff/openff_unconstrained-2.3.0.offxml"
    ff_type: "smirnoff-nagl"
  "Rosemary_Alpha_0":
    ff_path: "input_ff/openff_no_water_unconstrained-3.0.0-alpha0.offxml"
    ff_type: "smirnoff-nagl"
  ff14SB:
    ff_path: "input_ff/ff14SB.xml"
    ff_type: "amber"
  ff19SB:
    ff_path: "input_ff/protein.ff19SB.xml"
    ff_type: "amber"
  espaloma:
    ff_path: "dummy_ff.xml"
    ff_type: "espaloma"

# yammbs torsion scan analysis configuration
yammbs_analysis:
  # Default base force fields passed to yammbs
  base_force_fields:
    - "openff-2.3.0"

  # Per-target extra force fields
  targets:
    tnet500:
      test:
        extra_force_fields:
          - "input_ff/esp04.offxml"
          - "input_ff/aceff20.offxml"
      validation:
        # For validation, all ablation variants are included in analyse_tnet500_validation_ablations rule
        extra_force_fields: []
    jacs_fragments:
      test:
        extra_force_fields:
          - "input_ff/bespokefit1_sage_jacs_frags.offxml"
          - "input_ff/esp04.offxml"
          - "input_ff/aceff20.offxml"
          #- "input_ff/openff_unconstrained-2.3.0.offxml"
