# Snakemake workflow configuration

# Random seed for reproducibility
random_seed: 0

# TNet500 dataset splitting
tnet500_frac_test: 0.8  # 20% validation, 80% test

# Protein force field configurations for benchmarking
protein_force_fields:
  "Sage_230":
    ff_path: "input_ff/openff_unconstrained-2.3.0.offxml"
    ff_type: "smirnoff-nagl"
  "Rosemary_Alpha_0":
    ff_path: "input_ff/openff_no_water_unconstrained-3.0.0-alpha0.offxml"
    ff_type: "smirnoff-nagl"
  ff14SB:
    ff_path: "input_ff/ff14SB.xml"
    ff_type: "amber"
  ff19SB:
    ff_path: "input_ff/protein.ff19SB.xml"
    ff_type: "amber"
  espaloma:
    ff_path: "dummy_ff.xml"
    ff_type: "espaloma"

# yammbs torsion scan analysis configuration
yammbs_analysis:
  # Default base force fields passed to yammbs
  base_force_fields:
    - "openff-2.3.0"

  # Per-target extra force fields
  targets:
    tnet500:
      test:
        extra_force_fields:
          - "input_ff/esp04.offxml"
          - "input_ff/aceff20.offxml"
      validation:
        # For validation, all ablation variants are included in analyse_tnet500_validation_ablations rule
        extra_force_fields: []
    jacs_fragments:
      test:
        extra_force_fields:
          - "input_ff/bespokefit1_sage_jacs_frags.offxml"
          - "input_ff/esp04.offxml"
          #- "input_ff/openff_unconstrained-2.3.0.offxml"
